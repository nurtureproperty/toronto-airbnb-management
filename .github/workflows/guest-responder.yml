name: Guest Responder

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Allow manual trigger

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit state file back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv anthropic slack-sdk

      - name: Run guest responder
        env:
          HOSPITABLE_API_TOKEN: ${{ secrets.HOSPITABLE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_HOSPITABLE_CHANNEL_ID: ${{ secrets.SLACK_HOSPITABLE_CHANNEL_ID }}
        run: python scripts/guest-responder.py

      - name: Run review-to-google (5-star review tagger)
        env:
          HOSPITABLE_API_TOKEN: ${{ secrets.HOSPITABLE_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GHL_API_TOKEN: ${{ secrets.GHL_API_TOKEN }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: python scripts/review-to-google.py

      - name: Save state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/guest-responder-state.json scripts/review-to-google-state.json
          git diff --staged --quiet || git commit -m "Update guest responder state [skip ci]"
          git push
